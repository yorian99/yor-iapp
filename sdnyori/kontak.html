<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kontak - SMA Negeri 1 Bangun Bangsa</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></head>
<body>
    <header>...</header>
    <main>
        <section class="page-hero"><div class="container"><h1>Hubungi Kami</h1><p>Butuh bantuan? Tim PPDB siap membantu Anda.</p></div></section>
        <section class="kontak-info">
            <div class="container">
                <div><i class="fas fa-envelope"></i> ppdb@smantbangunbangsa.sch.id</div>
                <div><i class="fas fa-phone"></i> (024) 1234567</div>
                <div><i class="fas fa-clock"></i> Senin – Jumat (08.00 – 15.00 WIB)</div>
                <div><i class="fas fa-map-marker-alt"></i> Jl. Pendidikan No. 1, Bangun Bangsa, Kota Bangsa</div>
            </div>
        </section>
        <section class="form-kontak">
            <div class="container">
                <h2>Kirim Pesan</h2>
                <form id="contactForm">
                    <input type="text" id="contactName" placeholder="Nama Anda" required>
                    <input type="email" id="contactEmail" placeholder="Email" required>
                    <input type="text" id="contactSubject" placeholder="Subjek">
                    <textarea id="contactMessage" placeholder="Pesan..." required></textarea>
                    <button type="submit" class="btn btn-primary">Kirim</button>
                    <div id="contactMessageStatus"></div>
                </form>
            </div>
        </section>
    </main>
    <footer>...</footer>
    <script src="js/contact.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
