<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Presensi Korwil Sine</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .bg-late { background-color: #fef9c3 !important; } /* Kuning Lembut */
    .bg-outside { background-color: #fee2e2 !important; } /* Merah Lembut */
    .bg-psw { background-color: #d1fae5 !important; } /* Hijau Lembut untuk PSW */
    
    /* Animasi untuk login */
    @keyframes slideInLeft {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-slide-left {
      animation: slideInLeft 0.6s ease-out forwards;
    }
    .animate-slide-right {
      animation: slideInRight 0.6s ease-out forwards;
    }
  </style>

  <!-- Polyfill untuk google.script.run di Vercel -->
  <script>
    (function() {
      // Ganti URL ini dengan URL Apps Script yang sudah dideploy
      const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9mWLQM1duMM_3gFzAuWM0szn5dxMcQSjsoFU18zFSFtGm3XIKMXdANwAPgooz1uZ2/exec';

      // Jika sudah ada google.script (misal di lingkungan Apps Script), biarkan asli
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        return;
      }

      class GoogleScriptRun {
        constructor() {
          this._successHandler = null;
          this._failureHandler = null;
          this._url = APP_SCRIPT_URL;
        }
        withSuccessHandler(handler) {
          this._successHandler = handler;
          return this;
        }
        withFailureHandler(handler) {
          this._failureHandler = handler;
          return this;
        }
        callFunction(funcName, args) {
          fetch(this._url, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: funcName, args })
          })
          .then(res => res.json())
          .then(data => {
            if (this._successHandler) this._successHandler(data);
          })
          .catch(err => {
            if (this._failureHandler) this._failureHandler(err);
          });
        }
      }

      const runHandler = new GoogleScriptRun();
      const proxy = new Proxy(runHandler, {
        get(target, prop) {
          if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') {
            return target[prop].bind(target);
          } else {
            return (...args) => target.callFunction(prop, args);
          }
        }
      });

      window.google = window.google || {};
      window.google.script = window.google.script || {};
      window.google.script.run = proxy;
    })();
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- jsPDF & autoTable for PDF Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Helper untuk komunikasi dengan Google Script
    const runGoogleScript = (funcName, ...args) => {
      return new Promise((resolve, reject) => {
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            [funcName](...args);
        } else {
          console.warn('Google Script tidak terdeteksi. Menggunakan simulasi.');
          setTimeout(() => resolve([]), 500);
        }
      });
    };

    // Fungsi untuk mengekstrak file ID dari URL Google Drive
    const extractFileIdFromDriveUrl = (url) => {
      if (!url) return null;
      let match = url.match(/\/file\/d\/([^\/]+)/);
      if (match) return match[1];
      match = url.match(/[?&]id=([^&]+)/);
      if (match) return match[1];
      match = url.match(/\/d\/([^\/]+)\/preview/);
      if (match) return match[1];
      return null;
    };

    // Logika Penentuan Terlambat (Datang > 07:30)
    const checkLateStatus = (waktuStr, jenisPresensi) => {
      if (!waktuStr || !jenisPresensi || jenisPresensi.toLowerCase() !== 'datang') return false;
      try {
        const parts = waktuStr.split('pukul ');
        if (parts.length < 2) return false;
        const timeString = parts[1].trim();
        const [hh, mm] = timeString.split(/[\.\:]/);
        const hours = parseInt(hh, 10);
        const mins = parseInt(mm, 10);
        const totalMinutes = (hours * 60) + mins;
        return totalMinutes > 450; // 07:30 = 450 menit
      } catch (e) {
        return false;
      }
    };

    const isOutsideRadius = (ketRadius) => {
      return ketRadius && ketRadius.toLowerCase().includes('luar radius');
    };

    const isTidakHadir = (ketRadius) => {
      return ketRadius && (ketRadius.toLowerCase().includes('tidak hadir') || ketRadius.toLowerCase().includes('hari libur'));
    };

    // Fungsi normalisasi nama: hapus semua karakter non-alfanumerik, ubah ke lowercase
    const normalizeName = (name) => {
      if (!name) return '';
      return name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
    };

    // Fungsi untuk memparsing tanggal dari string Waktu Presensi
    const parsePresensiDate = (waktuStr) => {
      if (!waktuStr) return null;
      // Format: "Senin, 2 Maret 2026 pukul 06.32.16"
      const parts = waktuStr.split('pukul')[0].trim(); // "Senin, 2 Maret 2026"
      const dateParts = parts.split(', ')[1]; // "2 Maret 2026"
      if (!dateParts) return null;
      const [day, monthName, year] = dateParts.split(' ');
      const monthMap = {
        'Januari': 1, 'Februari': 2, 'Maret': 3, 'April': 4, 'Mei': 5, 'Juni': 6,
        'Juli': 7, 'Agustus': 8, 'September': 9, 'Oktober': 10, 'November': 11, 'Desember': 12
      };
      const month = monthMap[monthName];
      if (!month) return null;
      return `${day.padStart(2, '0')}/${month.toString().padStart(2, '0')}/${year}`;
    };

    // Fungsi untuk mengubah tanggal ISO (yyyy-mm-dd) ke dd/mm/yyyy
    const parseIjinDate = (dateStr) => {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-');
      if (!year || !month || !day) return null;
      return `${day.padStart(2, '0')}/${month.padStart(2, '0')}/${year}`;
    };

    // Fungsi untuk mengecek apakah suatu tanggal (dd/mm/yyyy) berada dalam rentang
    const isDateInRange = (dateStr, startStr, endStr) => {
      if (!dateStr || !startStr || !endStr) return false;
      // Konversi ke angka untuk perbandingan
      const toNum = (d) => {
        const [dd, mm, yyyy] = d.split('/').map(Number);
        return yyyy * 10000 + mm * 100 + dd;
      };
      const dateNum = toNum(dateStr);
      const startNum = toNum(startStr);
      const endNum = toNum(endStr);
      return dateNum >= startNum && dateNum <= endNum;
    };

    // Fungsi untuk memperkaya data presensi dengan informasi PSW dari ijin
    const enrichPresensiWithIjin = (presensi, ijin) => {
      if (!presensi || !ijin) return presensi;
      // Filter ijin yang disetujui (case insensitive)
      const approvedIjin = ijin.filter(item => item.Status && item.Status.toLowerCase() === 'disetujui');
      
      return presensi.map(p => {
        const psw = approvedIjin.some(item => {
          // Normalisasi nama pegawai
          const namaPegawaiPresensi = normalizeName(p['Nama Pegawai'] || '');
          const namaPegawaiIjin = normalizeName(item['Nama Pegawai'] || '');
          if (namaPegawaiPresensi !== namaPegawaiIjin) return false;
          
          const presensiDate = parsePresensiDate(p['Waktu']);
          if (!presensiDate) return false;
          
          // Konversi tanggal ijin dari ISO ke dd/mm/yyyy
          const startDate = parseIjinDate(item['Tanggal Awal']);
          const endDate = parseIjinDate(item['Tanggal Berakir']);
          if (!startDate || !endDate) return false;
          
          return isDateInRange(presensiDate, startDate, endDate);
        });
        
        if (psw) {
          return { ...p, isPSW: true, displayRadius: 'PSW' };
        } else {
          return { ...p, isPSW: false, displayRadius: p['Keterangan Radius'] };
        }
      });
    };

    // ========== KOMPONEN LOGIN ==========
    const Login = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        const res = await runGoogleScript('login', username, password);
        if (res && res.success) onLogin(res.user);
        else Swal.fire('Error', 'Username atau password salah!', 'error');
        setLoading(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 px-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl overflow-hidden flex flex-col md:flex-row">
            {/* Bagian Kiri: Form Login */}
            <div className="md:w-1/2 p-8 lg:p-12 flex flex-col justify-center animate-slide-left">
              <div className="mb-8 text-center md:text-left">
                <div className="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto md:mx-0 mb-4 shadow-lg">
                  <i className="fas fa-fingerprint text-5xl text-blue-600"></i>
                </div>
                <h2 className="text-3xl font-black text-slate-800">Korwil Sine</h2>
                <p className="text-slate-500 text-sm">Sistem Monitoring Presensi</p>
              </div>
              <form onSubmit={handleSubmit} className="space-y-5">
                <div>
                  <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Username</label>
                  <input type="text" required className="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition" placeholder="Masukkan username" value={username} onChange={e => setUsername(e.target.value)} />
                </div>
                <div>
                  <label className="block text-xs font-bold uppercase text-slate-400 mb-1">Password</label>
                  <input type="password" required className="w-full px-5 py-4 border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition" placeholder="********" value={password} onChange={e => setPassword(e.target.value)} />
                </div>
                <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black shadow-lg transition disabled:opacity-50 text-lg tracking-wider">
                  {loading ? 'Memproses...' : 'MASUK'}
                </button>
              </form>
            </div>
            
            {/* Bagian Kanan: Informasi */}
            <div className="hidden md:flex md:w-1/2 bg-gradient-to-br from-blue-600 to-indigo-800 p-12 flex-col justify-center items-center text-white animate-slide-right">
              <img 
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" 
                alt="Logo Ngawi"
                className="w-48 h-48 object-contain mb-8 drop-shadow-2xl"
                onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/200?text=Logo'; }}
              />
              <h3 className="text-4xl font-black text-center leading-tight">Monitoring Presensi Korwil Sine</h3>
              <p className="text-lg text-center mt-4 text-blue-100">Dinas Pendidikan Kabupaten Ngawi</p>
              <div className="mt-8 flex gap-4 text-sm bg-white/20 py-3 px-6 rounded-full backdrop-blur-sm">
                <i className="fas fa-calendar-alt"></i>
                <span>{new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ========== KOMPONEN DASHBOARD PRESENSI ==========
    const Dashboard = ({ data, refreshData, userRole, userLembaga }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [editingRow, setEditingRow] = useState(null);
      const [editVal, setEditVal] = useState('');
      const [modalImg, setModalImg] = useState(null);
      const [modalMap, setModalMap] = useState(null);

      const canEditLembaga = userRole === 'Admin' || userRole === 'User';

      // Jika tidak dapat mengedit lembaga, set filter sesuai lembaga user
      useEffect(() => {
        if (!canEditLembaga && userLembaga) {
          setFilterLembaga(userLembaga);
        }
      }, [canEditLembaga, userLembaga]);

      const filtered = useMemo(() => {
        return data.filter(i => 
          (i['Nama Lembaga'] || '').toLowerCase().includes(filterLembaga.toLowerCase()) &&
          (i['Nama Pegawai'] || '').toLowerCase().includes(filterNama.toLowerCase())
        );
      }, [data, filterLembaga, filterNama]);

      const stats = useMemo(() => {
        let datang = 0, pulang = 0, dalamRadius = 0, luarRadius = 0, psw = 0;
        filtered.forEach(item => {
          const jenis = (item['Jenis Presensi'] || '').toLowerCase();
          const radius = (item.displayRadius || item['Keterangan Radius'] || '').toLowerCase();
          if (jenis.includes('datang')) datang++;
          if (jenis.includes('pulang')) pulang++;
          if (radius.includes('luar radius')) luarRadius++;
          else if (radius.includes('dalam radius')) dalamRadius++;
          else if (radius === 'psw') psw++;
        });
        return { datang, pulang, dalamRadius, luarRadius, psw };
      }, [filtered]);

      const handleSaveKet = async (idx) => {
        const res = await runGoogleScript('updateKeteranganBukti', idx, editVal);
        if (res.success) {
          Swal.fire({ icon: 'success', title: 'Tersimpan', timer: 1000, showConfirmButton: false });
          setEditingRow(null);
          refreshData();
        }
      };

      return (
        <div className="space-y-6">
          {/* Statistik Cards */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl"><i className="fas fa-sign-in-alt"></i></div>
              <div><p className="text-xs text-slate-500 font-bold uppercase">Absen Datang</p><p className="text-2xl font-black text-slate-800">{stats.datang}</p></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="w-12 h-12 rounded-full bg-yellow-100 text-yellow-600 flex items-center justify-center text-xl"><i className="fas fa-sign-out-alt"></i></div>
              <div><p className="text-xs text-slate-500 font-bold uppercase">Absen Pulang</p><p className="text-2xl font-black text-slate-800">{stats.pulang}</p></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl"><i className="fas fa-map-marker-alt"></i></div>
              <div><p className="text-xs text-slate-500 font-bold uppercase">Dalam Radius</p><p className="text-2xl font-black text-slate-800">{stats.dalamRadius}</p></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-xl"><i className="fas fa-exclamation-triangle"></i></div>
              <div><p className="text-xs text-slate-500 font-bold uppercase">Luar Radius</p><p className="text-2xl font-black text-slate-800">{stats.luarRadius}</p></div>
            </div>
            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
              <div className="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-xl"><i className="fas fa-check-circle"></i></div>
              <div><p className="text-xs text-slate-500 font-bold uppercase">PSW</p><p className="text-2xl font-black text-slate-800">{stats.psw}</p></div>
            </div>
          </div>

          {/* Filter */}
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center">
            <h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Data:</h3>
            <input 
              type="text" 
              placeholder="Cari Lembaga..." 
              className={`border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500 ${!canEditLembaga ? 'bg-slate-100 cursor-not-allowed' : ''}`}
              value={filterLembaga} 
              onChange={e => canEditLembaga && setFilterLembaga(e.target.value)} 
              disabled={!canEditLembaga}
            />
            <input 
              type="text" 
              placeholder="Cari Nama Pegawai..." 
              className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" 
              value={filterNama} 
              onChange={e => setFilterNama(e.target.value)} 
            />
            {!canEditLembaga && userLembaga && (
              <span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full">
                <i className="fas fa-lock mr-1"></i> Filter lembaga dikunci
              </span>
            )}
          </div>

          {/* Tabel Presensi */}
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b">
                  <tr>
                    <th className="px-4 py-4">Waktu Presensi</th>
                    <th className="px-4 py-4">Lembaga</th>
                    <th className="px-4 py-4">Pegawai</th>
                    <th className="px-4 py-4 text-center">Bukti/Map</th>
                    <th className="px-4 py-4">Radius Status</th>
                    <th className="px-4 py-4">Ket. Bukti</th>
                  </tr>
                </thead>
                <tbody className="divide-y">
                  {filtered.map((item, i) => {
                    const outRadius = isOutsideRadius(item.displayRadius);
                    const late = checkLateStatus(item['Waktu'], item['Jenis Presensi']);
                    const tidakHadir = isTidakHadir(item.displayRadius);
                    const isPSW = item.isPSW;

                    let bgClass = "bg-white";
                    if (isPSW) {
                      bgClass = "bg-psw hover:bg-green-200";
                    } else if (tidakHadir) {
                      bgClass = "bg-black text-white";
                    } else if (outRadius) {
                      bgClass = "bg-outside hover:bg-red-200";
                    } else if (late) {
                      bgClass = "bg-late hover:bg-yellow-200";
                    }

                    return (
                      <tr key={i} className={`${bgClass} transition-colors text-slate-700`}>
                        <td className="px-4 py-3 whitespace-nowrap">
                          <span className="font-medium block">{item['Waktu']}</span>
                          <span className="text-[10px] px-1.5 py-0.5 bg-slate-200 rounded text-slate-600 font-bold uppercase">{item['Jenis Presensi']}</span>
                        </td>
                        <td className="px-4 py-3">{item['Nama Lembaga']}</td>
                        <td className="px-4 py-3">
                          <div className="font-bold">{item['Nama Pegawai']}</div>
                          <div className="text-xs opacity-70">{item['Nip']}</div>
                        </td>
                        <td className="px-4 py-3 text-center">
                          <div className="flex justify-center gap-2">
                            {/* Tombol Bukti dan Map hanya untuk Admin atau User */}
                            {(userRole === 'Admin' || userRole === 'User') ? (
                              <>
                                <button 
                                  onClick={() => setModalImg(item['Bukti Dukung'])} 
                                  className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 shadow-sm"
                                  title="Lihat Bukti"
                                >
                                  <i className="fas fa-image"></i>
                                </button>
                                <button 
                                  onClick={() => setModalMap({lat: item.Latitude, lng: item.Longitude})} 
                                  className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center hover:bg-emerald-200 shadow-sm"
                                  title="Lihat Peta"
                                >
                                  <i className="fas fa-map-marker-alt"></i>
                                </button>
                              </>
                            ) : (
                              <>
                                <span 
                                  className="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center"
                                  title="Hanya Admin/User yang dapat melihat bukti"
                                >
                                  <i className="fas fa-lock"></i>
                                </span>
                                <span 
                                  className="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center"
                                  title="Hanya Admin/User yang dapat melihat peta"
                                >
                                  <i className="fas fa-lock"></i>
                                </span>
                              </>
                            )}
                          </div>
                        </td>
                        <td className="px-4 py-3">
                          <span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${isPSW ? 'bg-green-600 text-white' : tidakHadir ? 'bg-black text-white' : outRadius ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`}>
                            {item.displayRadius}
                          </span>
                          <div className="text-[10px] mt-1 text-slate-500 font-medium">{item['Jarak Absen']}</div>
                        </td>
                        <td className="px-4 py-3 min-w-[150px]">
                          {editingRow === item._rowIndex ? (
                            <div className="flex gap-1">
                              <input className="border p-1 rounded text-xs flex-1" value={editVal} onChange={e => setEditVal(e.target.value)} autoFocus />
                              <button onClick={() => handleSaveKet(item._rowIndex)} className="bg-green-600 text-white px-2 py-1 rounded shadow-sm"><i className="fas fa-check"></i></button>
                            </div>
                          ) : (
                            <div className="flex justify-between items-center group cursor-pointer" onClick={() => {setEditingRow(item._rowIndex); setEditVal(item['Keterangan Bukti'] || '');}}>
                              <span className="truncate max-w-[120px]">{item['Keterangan Bukti'] || '-'}</span>
                              <i className="fas fa-pencil-alt text-slate-300 group-hover:text-blue-500 text-xs transition"></i>

          {/* Modal Image */}

              <div className="w-full max-w-3xl bg-white rounded-2xl overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                <div className="p-4 flex justify-between items-center bg-slate-800 text-white">

                  <button onClick={() => setModalMap(null)} className="text-3xl leading-none">&times;</button>

    // ========== KOMPONEN DOKUMEN IJIN (dengan filter lembaga terkunci sesuai role, dan aksi hanya untuk Admin/User) ==========
    const DokumenIjin = ({ data, refreshData, userRole, userLembaga }) => {
      const [modalPdf, setModalPdf] = useState(null);
      const [editRow, setEditRow] = useState(null);
      const [status, setStatus] = useState('');
      const [ket, setKet] = useState('');
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');

      const canEditLembaga = userRole === 'Admin' || userRole === 'User';
      const canEditData = userRole === 'Admin' || userRole === 'User'; // untuk aksi CRUD

      // Jika tidak dapat mengedit lembaga, set filter sesuai lembaga user
      useEffect(() => {
        if (!canEditLembaga && userLembaga) {
          setFilterLembaga(userLembaga);
        }
      }, [canEditLembaga, userLembaga]);

      const filtered = useMemo(() => {
        return data.filter(item => 
          (item['Nama Lembaga'] || '').toLowerCase().includes(filterLembaga.toLowerCase()) &&
          (item['Nama Pegawai'] || '').toLowerCase().includes(filterNama.toLowerCase())
        );
      }, [data, filterLembaga, filterNama]);

      const handleSave = async (idx) => {
        const res = await runGoogleScript('updateDokumenIjin', idx, status, ket);
        if (res.success) {
          Swal.fire({ icon: 'success', title: 'Berhasil Update', timer: 1000, showConfirmButton: false });
          setEditRow(null);
          refreshData();
        }
      };

      const handleDelete = async (rowIndex, nama) => {
        const confirm = await Swal.fire({
          title: 'Hapus Dokumen Ijin?',
          text: `Yakin ingin menghapus pengajuan dari ${nama}?`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#334155',
          confirmButtonText: 'Ya, Hapus'
        });
        if (confirm.isConfirmed) {
          const res = await runGoogleScript('deleteDokumenIjin', rowIndex);
          if (res.success) {
            Swal.fire('Terhapus', 'Data berhasil dihapus', 'success');
            refreshData();
          } else {
            Swal.fire('Error', 'Gagal menghapus data', 'error');
          }
        }
      };

      return (
        <div className="space-y-6">
          {/* Filter */}
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center">
            <h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Dokumen Ijin:</h3>
            <input 
              type="text" 
              placeholder="Cari Lembaga..." 
              className={`border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500 ${!canEditLembaga ? 'bg-slate-100 cursor-not-allowed' : ''}`}
              value={filterLembaga} 
              onChange={e => canEditLembaga && setFilterLembaga(e.target.value)} 
              disabled={!canEditLembaga}
            />
            <input 
              type="text" 
              placeholder="Cari Nama Pegawai..." 
              className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" 
              value={filterNama} 
              onChange={e => setFilterNama(e.target.value)} 
            />
            {!canEditLembaga && userLembaga && (
              <span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full">
                <i className="fas fa-lock mr-1"></i> Filter lembaga dikunci
              </span>
            )}
          </div>

          {/* Tabel Dokumen Ijin */}
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b">
                  <tr>
                    <th className="px-4 py-4">Nama Pegawai</th>
                    <th className="px-4 py-4">Jenis Ijin</th>
                    <th className="px-4 py-4">Tanggal Awal</th>
                    <th className="px-4 py-4">Tanggal Akhir</th>
                    <th className="px-4 py-4 text-center">File</th>
                    <th className="px-4 py-4">Status</th>
                    <th className="px-4 py-4">Keterangan</th>
                    {canEditData && <th className="px-4 py-4 text-center">Aksi</th>}
                  </tr>
                </thead>
                <tbody className="divide-y text-slate-700">
                  {filtered.map((item, i) => (
                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                      <td className="px-4 py-3">
                        <div className="font-bold">{item['Nama Pegawai']}</div>
                        <div className="text-[10px] text-slate-500">{item['Nama Lembaga']}</div>
                      </td>
                      <td className="px-4 py-3 font-medium text-blue-600">{item['Jenis Ijin']}</td>
                      <td className="px-4 py-3">{item['Tanggal Awal'] || '-'}</td>
                      <td className="px-4 py-3">{item['Tanggal Berakir'] || '-'}</td>
                      <td className="px-4 py-3 text-center">
                        <button onClick={() => setModalPdf(item['File URL'])} className="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-red-700 transition flex items-center gap-1 mx-auto shadow-sm">
                          <i className="fas fa-file-pdf"></i> PDF
                        </button>
                      </td>
                      <td className="px-4 py-3">
                        {editRow === item._rowIndex && canEditData ? (
                          <select className="border p-1 rounded w-full text-xs" value={status} onChange={e => setStatus(e.target.value)}>
                            <option value="Diajukan">Diajukan</option>
                            <option value="DiSetujui">DiSetujui</option>
                            <option value="Ditolak">Ditolak</option>
                          </select>
                        ) : (
                          <span className={`px-2 py-1 rounded text-[10px] font-black uppercase ${item.Status && item.Status.toLowerCase() === 'disetujui' ? 'bg-green-100 text-green-700 border border-green-200' : item.Status && item.Status.toLowerCase() === 'ditolak' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700 border border-blue-200'}`}>
                            {item.Status || '-'}
                          </span>
                        )}
                      </td>
                      <td className="px-4 py-3">
                        {editRow === item._rowIndex && canEditData ? (
                          <input className="border p-1 rounded w-full text-xs" value={ket} onChange={e => setKet(e.target.value)} placeholder="Tulis catatan..." />
                        ) : (
                          <span className="text-slate-500 italic">{item.Keterangan || '-'}</span>
                        )}
                      </td>
                      {canEditData && (
                        <td className="px-4 py-3">
                          <div className="flex gap-2">
                            {editRow === item._rowIndex ? (
                              <button onClick={() => handleSave(item._rowIndex)} className="bg-green-600 text-white w-8 h-8 rounded-lg shadow-md flex items-center justify-center hover:bg-green-700 transition"><i className="fas fa-save"></i></button>
                            ) : (
                              <>
                                <button onClick={() => {setEditRow(item._rowIndex); setStatus(item.Status); setKet(item.Keterangan);}} className="text-slate-400 hover:text-blue-600 w-8 h-8 rounded-lg hover:bg-blue-50 transition flex items-center justify-center" title="Edit">
                                  <i className="fas fa-edit"></i>
                                </button>
                                <button onClick={() => handleDelete(item._rowIndex, item['Nama Pegawai'])} className="text-red-400 hover:text-red-600 w-8 h-8 rounded-lg hover:bg-red-50 transition flex items-center justify-center" title="Hapus">
                                  <i className="fas fa-trash-alt"></i>
                                </button>
                              </>
                            )}
                          </div>
                        </td>
                      )}
                    </tr>
                  ))}
                  {filtered.length === 0 && (
                    <tr><td colSpan={canEditData ? 8 : 7} className="text-center py-10 text-slate-400 font-medium italic">Tidak ada data dokumen ijin</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal PDF */}
          {modalPdf && (
            <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={() => setModalPdf(null)}>
              <div className="w-full max-w-5xl h-[90vh] bg-white rounded-2xl overflow-hidden flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                <div className="p-4 flex justify-between bg-slate-800 text-white">
                  <span className="font-bold flex items-center gap-2"><i className="fas fa-file-pdf text-red-400"></i>Pratinjau Dokumen</span>
                  <button onClick={() => setModalPdf(null)} className="text-2xl leading-none">&times;</button>
                </div>
                <iframe src={modalPdf.replace('/view', '/preview')} className="flex-1 w-full border-none"></iframe>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========== KOMPONEN DATABASE PEGAWAI (CRUD) - dengan pembatasan akses Admin ==========
    const DatabasePegawai = ({ refreshParent, userRole }) => {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(false);
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [modalOpen, setModalOpen] = useState(false);
      const [editingRow, setEditingRow] = useState(null);
      const [formData, setFormData] = useState({
        'Username (MP/ID)': '',
        'Password': '',
        'Name Lembaga': '',
        'Name Pegawai': '',
        'Latitude': '',
        'Longitude': '',
        'Radius (m)': '',
        'Role': ''
      });

      const isAdmin = userRole === 'Admin';

      const fetchData = async () => {
        setLoading(true);
        const res = await runGoogleScript('getPegawai');
        setData(res || []);
        setLoading(false);
      };

      useEffect(() => {
        fetchData();
      }, []);

      const filtered = useMemo(() => {
        return data.filter(item => 
          (item['Name Lembaga'] || '').toLowerCase().includes(filterLembaga.toLowerCase()) &&
          (item['Name Pegawai'] || '').toLowerCase().includes(filterNama.toLowerCase())
        );
      }, [data, filterLembaga, filterNama]);

      const openModal = (item = null) => {
        if (!isAdmin) {
          Swal.fire('Akses Ditolak', 'Hanya Admin yang dapat menambah/mengedit data pegawai.', 'warning');
          return;
        }
        if (item) {
          setFormData({
            'Username (MP/ID)': item['Username (MP/ID)'] || '',
            'Password': item['Password'] || '',
            'Name Lembaga': item['Name Lembaga'] || '',
            'Name Pegawai': item['Name Pegawai'] || '',
            'Latitude': item['Latitude'] || '',
            'Longitude': item['Longitude'] || '',
            'Radius (m)': item['Radius (m)'] || '',
            'Role': item['Role'] || ''
          });
          setEditingRow(item._rowIndex);
        } else {
          setFormData({
            'Username (MP/ID)': '',
            'Password': '',
            'Name Lembaga': '',
            'Name Pegawai': '',
            'Latitude': '',
            'Longitude': '',
            'Radius (m)': '',
            'Role': ''
          });
          setEditingRow(null);
        }
        setModalOpen(true);
      };

      const handleInputChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = async () => {
        if (!formData['Username (MP/ID)'] || !formData['Password'] || !formData['Name Pegawai']) {
          Swal.fire('Peringatan', 'Username, Password, dan Nama Pegawai harus diisi', 'warning');
          return;
        }

        setLoading(true);
        let res;
        if (editingRow) {
          res = await runGoogleScript('updatePegawai', editingRow, formData);
        } else {
          res = await runGoogleScript('addPegawai', formData);
        }
        if (res.success) {
          Swal.fire({ icon: 'success', title: 'Berhasil', timer: 1500, showConfirmButton: false });
          setModalOpen(false);
          fetchData();
          if (refreshParent) refreshParent();
        } else {
          Swal.fire('Error', 'Gagal menyimpan data', 'error');
        }
        setLoading(false);
      };

      const handleDelete = async (rowIndex, nama) => {
        if (!isAdmin) {
          Swal.fire('Akses Ditolak', 'Hanya Admin yang dapat menghapus data pegawai.', 'warning');
          return;
        }
        const confirm = await Swal.fire({
          title: 'Hapus Pegawai?',
          text: `Yakin ingin menghapus ${nama}?`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#334155',
          confirmButtonText: 'Ya, Hapus'
        });
        if (confirm.isConfirmed) {
          setLoading(true);
          const res = await runGoogleScript('deletePegawai', rowIndex);
          if (res.success) {
            Swal.fire('Terhapus', 'Data pegawai berhasil dihapus', 'success');
            fetchData();
          } else {
            Swal.fire('Error', 'Gagal menghapus', 'error');
          }
          setLoading(false);
        }
      };

      return (
        <div className="space-y-6">
          {/* Header dan Tombol Tambah */}
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap justify-between items-center">
            <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2">
              <i className="fas fa-database text-blue-600"></i> Database Pegawai
            </h3>
            {isAdmin ? (
              <button onClick={() => openModal()} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 transition">
                <i className="fas fa-plus-circle"></i> Tambah Pegawai
              </button>
            ) : (
              <div className="text-sm text-red-600 font-semibold bg-red-50 px-4 py-2 rounded-xl border border-red-200">
                <i className="fas fa-lock mr-2"></i>Hanya Admin dapat mengelola data
              </div>
            )}
          </div>

          {/* Filter */}
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center">
            <h4 className="font-bold text-slate-700 mr-2">Filter:</h4>
            <input type="text" placeholder="Cari Lembaga..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterLembaga} onChange={e => setFilterLembaga(e.target.value)} />
            <input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterNama} onChange={e => setFilterNama(e.target.value)} />
          </div>

          {/* Tabel Pegawai */}
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-800 text-white border-b">
                  <tr>
                    <th className="px-4 py-4">Username (MP/ID)</th>
                    <th className="px-4 py-4">Password</th>
                    <th className="px-4 py-4">Lembaga</th>
                    <th className="px-4 py-4">Nama Pegawai</th>
                    <th className="px-4 py-4">Latitude</th>
                    <th className="px-4 py-4">Longitude</th>
                    <th className="px-4 py-4">Radius (m)</th>
                    <th className="px-4 py-4">Role</th>
                    {isAdmin && <th className="px-4 py-4 text-center">Aksi</th>}
                  </tr>
                </thead>
                <tbody className="divide-y">
                  {filtered.map((item, i) => (
                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                      <td className="px-4 py-3 font-medium">{item['Username (MP/ID)']}</td>
                      <td className="px-4 py-3">••••••</td>
                      <td className="px-4 py-3">{item['Name Lembaga']}</td>
                      <td className="px-4 py-3 font-bold">{item['Name Pegawai']}</td>
                      <td className="px-4 py-3">{item['Latitude']}</td>
                      <td className="px-4 py-3">{item['Longitude']}</td>
                      <td className="px-4 py-3">{item['Radius (m)']}</td>
                      <td className="px-4 py-3">
                        <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-[10px] font-black uppercase">{item['Role']}</span>
                      </td>
                      {isAdmin && (
                        <td className="px-4 py-3">
                          <div className="flex justify-center gap-2">
                            <button onClick={() => openModal(item)} className="text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-lg flex items-center justify-center transition" title="Edit">
                              <i className="fas fa-edit"></i>
                            </button>
                            <button onClick={() => handleDelete(item._rowIndex, item['Name Pegawai'])} className="text-red-600 hover:bg-red-50 w-8 h-8 rounded-lg flex items-center justify-center transition" title="Hapus">
                              <i className="fas fa-trash-alt"></i>
                            </button>
                          </div>
                        </td>
                      )}
                    </tr>
                  ))}
                  {filtered.length === 0 && (
                    <tr><td colSpan={isAdmin ? 9 : 8} className="text-center py-10 text-slate-400 font-medium italic">Tidak ada data pegawai</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal Form Tambah/Edit Pegawai */}
          {modalOpen && isAdmin && (
            <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4 animate-in fade-in duration-200" onClick={() => setModalOpen(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                <div className="p-6 border-b flex justify-between items-center bg-slate-800 text-white sticky top-0">
                  <h4 className="text-xl font-bold flex items-center gap-2">
                    <i className={`fas ${editingRow ? 'fa-edit' : 'fa-user-plus'} text-blue-400`}></i>
                    {editingRow ? 'Edit Pegawai' : 'Tambah Pegawai Baru'}
                  </h4>
                  <button onClick={() => setModalOpen(false)} className="text-3xl leading-none hover:text-slate-300">&times;</button>
                </div>
                <div className="p-6 space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Username (MP/ID) *</label>
                      <input type="text" name="Username (MP/ID)" value={formData['Username (MP/ID)']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Password *</label>
                      <input type="text" name="Password" value={formData['Password']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Lembaga</label>
                      <input type="text" name="Name Lembaga" value={formData['Name Lembaga']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Pegawai *</label>
                      <input type="text" name="Name Pegawai" value={formData['Name Pegawai']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Latitude</label>
                      <input type="text" name="Latitude" value={formData['Latitude']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Longitude</label>
                      <input type="text" name="Longitude" value={formData['Longitude']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Radius (m)</label>
                      <input type="text" name="Radius (m)" value={formData['Radius (m)']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Role</label>
                      <select name="Role" value={formData['Role']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Pilih Role</option>
                        <option value="Admin">Admin</option>
                        <option value="User">User</option>
                        <option value="Supervisor">Supervisor</option>
                      </select>
                    </div>
                  </div>
                  <div className="flex justify-end gap-3 pt-4 border-t">
                    <button onClick={() => setModalOpen(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">Batal</button>
                    <button onClick={handleSubmit} disabled={loading} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2 disabled:opacity-50">
                      {loading ? 'Menyimpan...' : <><i className="fas fa-save"></i> Simpan</>}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========== KOMPONEN MONITORING (EXPORT & RESET) - dengan pembatasan akses ==========
    const Monitoring = ({ presensiData, refreshData, userRole }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const isAdmin = userRole === 'Admin';
      const canExport = userRole === 'Admin' || userRole === 'User';

      const generateLaporanPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        const filtered = presensiData.filter(i => (i['Nama Lembaga'] || '').toLowerCase().includes(filterLembaga.toLowerCase()));

        doc.setFontSize(18);
        doc.setTextColor(30, 41, 59);
        doc.text("Laporan Monitoring Presensi Korwil Sine", 14, 15);
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 22);
        if(filterLembaga) doc.text(`Filter Lembaga: ${filterLembaga}`, 14, 27);

        const tableData = filtered.map(item => [
          item.Waktu,
          item['Nama Pegawai'],
          item['Nama Lembaga'],
          item['Jenis Presensi'],
          item.displayRadius || item['Keterangan Radius'],
          item['Keterangan Bukti'] || '-'
        ]);

        doc.autoTable({
          startY: filterLembaga ? 32 : 28,
          head: [['Waktu (Hari, Tanggal, Jam)', 'Nama Pegawai', 'Lembaga', 'Jenis', 'Status Radius', 'Keterangan']],
          body: tableData,
          theme: 'grid',
          headStyles: { fillColor: [30, 41, 59], textColor: [255, 255, 255], fontStyle: 'bold' },
          columnStyles: { 0: { cellWidth: 50 } },
          didParseCell: function(data) {
            const rowIndex = data.row.index;
            const item = filtered[rowIndex];
            if (item && data.section === 'body') {
              const outRadius = isOutsideRadius(item.displayRadius);
              const late = checkLateStatus(item['Waktu'], item['Jenis Presensi']);
              const tidakHadir = isTidakHadir(item.displayRadius);
              const isPSW = item.isPSW;

              if (isPSW) {
                data.cell.styles.fillColor = [209, 250, 229]; // hijau muda
                data.cell.styles.textColor = [6, 78, 59];
              } else if (tidakHadir) {
                data.cell.styles.fillColor = [0, 0, 0];
                data.cell.styles.textColor = [255, 255, 255];
              } else if (outRadius) {
                data.cell.styles.fillColor = [254, 226, 226];
                data.cell.styles.textColor = [153, 27, 27];
              } else if (late) {
                data.cell.styles.fillColor = [254, 249, 195];
                data.cell.styles.textColor = [133, 77, 14];
              }
            }
          }
        });

        doc.save(`Laporan_Presensi_Sine_${new Date().toISOString().split('T')[0]}.pdf`);
      };

      const handleReset = async () => {
        const resConfirm = await Swal.fire({
          title: 'RESET SEMUA DATA?',
          text: 'Data yang terhapus tidak dapat dikembalikan. Pastikan Anda sudah mengunduh PDF Laporan!',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#334155',
          confirmButtonText: 'Ya, Bersihkan Data'
        });
        if (resConfirm.isConfirmed) {
          Swal.fire({ title: 'Menghapus...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          const res = await runGoogleScript('resetDataPresensi');
          if (res.success) {
            Swal.fire('Terhapus', 'Database presensi telah dikosongkan.', 'success');
            refreshData();
          }
        }
      };

      return (
        <div className="bg-white p-8 rounded-2xl shadow-sm border space-y-8">
          <div className="border-b pb-6">
            <h3 className="text-2xl font-black text-slate-800 flex items-center gap-2">
              <i className="fas fa-file-export text-blue-600"></i> Manajemen Data
            </h3>
            <p className="text-slate-500 text-sm">Gunakan menu ini untuk mencetak laporan resmi atau melakukan pembersihan database secara berkala.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            {/* Bagian Ekspor PDF - hanya untuk Admin dan User */}
            {canExport ? (
              <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <h4 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                  <i className="fas fa-print text-emerald-600"></i> Ekspor Laporan PDF
                </h4>
                <div className="space-y-4">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 block">Filter Lembaga</label>
                    <input type="text" className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Tulis nama lembaga (opsional)..." value={filterLembaga} onChange={e => setFilterLembaga(e.target.value)} />
                  </div>
                  <button onClick={generateLaporanPDF} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg flex items-center justify-center gap-3 transition">
                    <i className="fas fa-file-pdf text-red-400"></i> UNDUH LAPORAN PDF
                  </button>
                </div>
              </div>
            ) : (
              <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex items-center justify-center">
                <p className="text-slate-500"><i className="fas fa-lock mr-2"></i>Anda tidak memiliki akses untuk mengekspor laporan.</p>
              </div>
            )}

            {/* Bagian Reset Data - hanya untuk Admin */}
            <div className="bg-red-50 p-6 rounded-2xl border border-red-100 flex flex-col justify-between">
              <div>
                <h4 className="font-bold text-red-800 mb-2 flex items-center gap-2">
                  <i className="fas fa-radiation-alt text-red-600"></i> Zona Berbahaya
                </h4>
                <p className="text-xs text-red-600/70 mb-6 leading-relaxed">
                  Menghapus semua Data <b>Presensi</b>. Aksi ini permanen dan tidak bisa dibatalkan.
                </p>
                {!isAdmin && (
                  <p className="text-xs text-red-600 font-bold mb-2">*Hanya Admin yang dapat mereset data</p>
                )}
              </div>
              {isAdmin ? (
                <button onClick={handleReset} className="w-full border-2 border-red-600 text-red-600 hover:bg-red-600 hover:text-white py-4 rounded-xl font-black transition flex items-center justify-center gap-2">
                  <i className="fas fa-trash-alt"></i> RESET DATA PRESENSI
                </button>
              ) : (
                <button disabled className="w-full border-2 border-gray-400 text-gray-400 bg-gray-100 py-4 rounded-xl font-black cursor-not-allowed flex items-center justify-center gap-2">
                  <i className="fas fa-trash-alt"></i> RESET (Terbatas untuk Admin)
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ========== MAIN APP ==========
    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [presensi, setPresensi] = useState([]);
      const [ijin, setIjin] = useState([]);
      const [loading, setLoading] = useState(false);

      const fetchData = async () => {
        setLoading(true);
        try {
          const [resP, resI] = await Promise.all([
            runGoogleScript('getPresensi'),
            runGoogleScript('getIjin')
          ]);
          setPresensi(resP || []);
          setIjin(resI || []);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      useEffect(() => { if (user) fetchData(); }, [user]);

      // Perkaya data presensi dengan informasi PSW dari ijin
      const enrichedPresensi = useMemo(() => {
        return enrichPresensiWithIjin(presensi, ijin);
      }, [presensi, ijin]);

      // Tentukan apakah pengguna dapat mengakses tab Database Pegawai
      const canAccessPegawai = user && (user.role === 'Admin' || user.role === 'User');

      // Jika tab aktif adalah 'pegawai' tetapi tidak punya akses, alihkan ke dashboard
      useEffect(() => {
        if (activeTab === 'pegawai' && !canAccessPegawai) {
          setActiveTab('dashboard');
        }
      }, [activeTab, canAccessPegawai]);

      const handleLogout = () => {
        Swal.fire({
          title: 'Yakin ingin keluar?',
          text: 'Anda akan kembali ke halaman login.',
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#334155',
          confirmButtonText: 'Ya, Keluar',
          cancelButtonText: 'Batal'
        }).then((result) => {
          if (result.isConfirmed) {
            setUser(null);
          }
        });
      };

      if (!user) return <Login onLogin={setUser} />;

      // Tentukan lembaga untuk non-Admin/User (gunakan role sebagai lembaga)
      const userLembaga = (user.role !== 'Admin' && user.role !== 'User') ? user.role : (user.lembaga || '');

      // Daftar tab yang tersedia, filter berdasarkan akses
      const tabs = [
        {id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard Presensi'},
        {id: 'psw', icon: 'fa-file-signature', label: 'Dokumen Ijin (PSW)'},
        ...(canAccessPegawai ? [{id: 'pegawai', icon: 'fa-users', label: 'Database Pegawai'}] : []),
        {id: 'monitoring', icon: 'fa-desktop', label: 'Monitoring & Ekspor'}
      ];

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-slate-100">
          {/* Sidebar */}
          <div className="w-full md:w-72 bg-slate-900 text-white flex flex-col shadow-2xl z-40">
            <div className="p-8 border-b border-slate-800 flex items-center gap-4 bg-slate-950/50">
              <div className="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20 overflow-hidden">
                <img 
                  src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" 
                  alt="Logo Ngawi"
                  className="w-full h-full object-cover"
                  onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/48?text=Logo'; }}
                />
              </div>
              <div>
                <span className="font-black text-xl tracking-tighter block">KORWIL SINE</span>
                <span className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Dashboard Monitoring</span>
              </div>
            </div>
            
            <nav className="flex-1 p-6 space-y-2">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all duration-300 ${activeTab === tab.id ? 'bg-blue-600 text-white shadow-xl translate-x-1' : 'text-slate-500 hover:bg-slate-800 hover:text-slate-300'}`}>
                  <i className={`fas ${tab.icon} w-6 text-center text-lg`}></i> {tab.label}
                </button>
              ))}
            </nav>

            <div className="p-6 border-t border-slate-800 bg-slate-950/30">
              <div className="flex items-center gap-4 mb-6 px-2">
                <div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center border-2 border-blue-500/30 text-blue-400 font-black">{user.nama.charAt(0)}</div>
                <div className="overflow-hidden">
                  <div className="text-xs text-slate-500 font-bold uppercase tracking-tighter">Petugas:</div>
                  <div className="font-black text-sm text-slate-200 truncate">{user.nama}</div>
                  <div className="mt-1">
                    <span className="px-2 py-0.5 bg-blue-600/20 text-blue-400 rounded-full text-[8px] font-black uppercase tracking-wider">
                      {user.role}
                    </span>
                  </div>
                  {userLembaga && (
                    <div className="mt-1 text-[10px] text-slate-400">
                      <i className="fas fa-building mr-1"></i>{userLembaga}
                    </div>
                  )}
                </div>
              </div>
              <button onClick={handleLogout} className="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-3 rounded-xl font-black transition-all border border-red-500/20 flex items-center justify-center gap-2">
                <i className="fas fa-power-off"></i> KELUAR
              </button>
            </div>
          </div>

          {/* Main Content Area */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="bg-white/80 backdrop-blur-md border-b px-8 py-5 flex justify-between items-center z-30 shadow-sm">
              <h2 className="text-2xl font-black text-slate-800 capitalize flex items-center gap-3">
                <span className="w-2 h-8 bg-blue-600 rounded-full"></span>
                {activeTab === 'dashboard' && 'Dashboard Presensi'}
                {activeTab === 'psw' && 'Dokumen Ijin (PSW)'}
                {activeTab === 'pegawai' && 'Database Pegawai'}
                {activeTab === 'monitoring' && 'Monitoring & Ekspor'}
              </h2>
              <button onClick={fetchData} className={`w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-50 text-slate-400 hover:text-blue-600 transition-all border border-slate-100 ${loading ? 'bg-blue-50' : 'bg-white'}`}>
                <i className={`fas fa-sync-alt text-lg ${loading ? 'fa-spin text-blue-600' : ''}`}></i>
              </button>
            </header>

            <div className="flex-1 overflow-auto p-4 md:p-8">
              {loading && presensi.length === 0 && activeTab !== 'pegawai' ? (
                <div className="h-full flex flex-col items-center justify-center space-y-6">
                  <div className="loader border-4 border-blue-100 border-t-blue-600 rounded-full w-16 h-16"></div>
                  <div className="text-center">
                    <span className="text-slate-800 font-black text-xl block">Menghubungkan ke Server...</span>
                    <span className="text-slate-400 text-sm">Sedang sinkronisasi</span>
                  </div>
                </div>
              ) : (
                <div className="max-w-7xl mx-auto">
                  {activeTab === 'dashboard' && <Dashboard data={enrichedPresensi} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}
                  {activeTab === 'psw' && <DokumenIjin data={ijin} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}
                  {activeTab === 'pegawai' && canAccessPegawai && <DatabasePegawai refreshParent={fetchData} userRole={user.role} />}
                  {activeTab === 'monitoring' && <Monitoring presensiData={enrichedPresensi} refreshData={fetchData} userRole={user.role} />}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
